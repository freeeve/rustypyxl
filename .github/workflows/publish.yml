name: Publish to PyPI

on:
  release:
    types: [published]
  # Lets the wheel matrix be exercised without cutting a release
  workflow_dispatch:

jobs:
  test:
    name: Test before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test suites
        run: |
          cargo test --workspace --release
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin pytest openpyxl pyarrow
          maturin develop --release
          pytest tests/

  # One abi3 wheel per platform, good for CPython 3.10 and up -- including
  # versions that do not exist yet, which no longer need a release to support.
  build-wheels:
    name: Wheel (${{ matrix.target }}, ${{ matrix.libc || matrix.runner }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, target: x86_64, libc: manylinux, manylinux: auto }
          - { runner: ubuntu-latest, target: aarch64, libc: manylinux, manylinux: auto }
          - { runner: ubuntu-latest, target: x86_64, libc: musllinux, manylinux: musllinux_1_2 }
          - { runner: ubuntu-latest, target: aarch64, libc: musllinux, manylinux: musllinux_1_2 }
          - { runner: macos-13, target: x86_64 }
          - { runner: macos-latest, target: aarch64 }
          - { runner: windows-latest, target: x64 }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          sccache: "true"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.libc || 'native' }}
          path: dist/*.whl
          if-no-files-found: error

  # An abi3 wheel claims to work on every CPython from 3.10 up, so prove it on
  # more than the one version it happened to be built with.
  verify-wheels:
    name: Verify wheel on Python ${{ matrix.python-version }}
    needs: build-wheels
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install the wheel and run the suite against it
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest openpyxl pyarrow
          # Only the manylinux x86_64 wheel is installable here; pip ignores the
          # rest. --no-index proves the wheel is used, not a PyPI download.
          python -m pip install --no-index --find-links dist rustypyxl
          python -c "import rustypyxl; print('imported ok')"
          pytest tests/

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [verify-wheels, build-sdist]
    # workflow_dispatch builds and verifies the matrix but must not publish
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rustypyxl/
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List distribution files
        run: |
          echo "Files to publish:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          print-hash: true

      - name: Summary
        run: |
          echo "## Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Published" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

  # Publishes the Rust library to crates.io on release, via crates.io Trusted
  # Publishing (OIDC) -- no stored token, mirroring the PyPI job above.
  #
  # Prerequisite (one-time): the crate must already exist and have a Trusted
  # Publisher configured on crates.io. crates.io does not support publishing a
  # brand-new crate via OIDC (no "pending publisher"), so the FIRST publish is
  # done manually with a token; this job takes over for every release after.
  publish-crate:
    name: Publish to crates.io
    needs: [test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for the OIDC token exchange
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Fails loudly if the workspace version was not bumped (crates.io rejects
      # republishing an existing version). A release should carry a new version,
      # so that is the correct failure rather than something to swallow.
      - name: Publish rustypyxl
        run: cargo publish -p rustypyxl
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
