name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  # Keep SONAR_TOKEN exercised: SonarQube Cloud auto-removes a no-expiry token
  # after 60 days of inactivity. Run on the 1st and 15th so even a skipped
  # scheduled run stays well inside that window (a strictly-monthly run would
  # sit right at the 60-day edge if one month were dropped).
  schedule:
    - cron: "0 6 1,15 * *"
  # Allow a manual re-run from the Actions tab without pushing.
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # cargo-tarpaulin was recompiled from source on every run, which is
      # several minutes of the job. Cache the built binary and the registry.
      - name: Cache cargo-tarpaulin and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tarpaulin
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-tarpaulin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tarpaulin-

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      # No continue-on-error: coverage silently failing meant Sonar scanned with
      # a stale or missing report and nobody noticed. If coverage cannot be
      # produced, that is a broken build, not a footnote.
      - name: Generate coverage report
        run: |
          cargo tarpaulin -p rustypyxl --features parquet \
            --exclude-files 'rustypyxl-pyo3/*' \
            --out Xml --output-dir .

      - name: Check the coverage report exists
        run: test -s cobertura.xml || (echo "tarpaulin produced no coverage report" && exit 1)

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
