# SonarCloud Configuration
sonar.projectKey=freeeve_rustypyxl
sonar.organization=freeeve

# Project metadata
sonar.projectName=rustypyxl
sonar.projectVersion=0.5.0

# Source directories
sonar.sources=rustypyxl-core/src,rustypyxl-pyo3/src
sonar.tests=tests


# Exclusions
sonar.exclusions=**/target/**,**/*.pyc,**/__pycache__/**,**/node_modules/**

# Test exclusions
sonar.test.exclusions=**/target/**

# Coverage report. cargo-tarpaulin's `--out Xml` writes cobertura.xml; this
# pointed at coverage.xml, a file nothing produced, so no coverage was ever
# ingested -- and the tarpaulin step ran with continue-on-error, so nothing said so.
sonar.rust.coverage.reportPaths=cobertura.xml

# Encoding
sonar.sourceEncoding=UTF-8
