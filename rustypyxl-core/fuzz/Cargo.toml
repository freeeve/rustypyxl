[package]
name = "rustypyxl-core-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
# zip builds the package the fuzzed XML parts are wrapped in. quick-xml used to
# be here so fuzz_xml could drive it directly, which fuzzed the dependency
# rather than this library; the targets now go through Workbook instead.
zip = "2.4"
tempfile = "3"

[dependencies.rustypyxl-core]
path = ".."
default-features = false

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "fuzz_xml"
path = "fuzz_targets/fuzz_xml.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_coordinates"
path = "fuzz_targets/fuzz_coordinates.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_load"
path = "fuzz_targets/fuzz_load.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_roundtrip"
path = "fuzz_targets/fuzz_roundtrip.rs"
test = false
doc = false
bench = false
